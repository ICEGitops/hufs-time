server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # /hufs-timetable/ prefix를 strip하여 정적 파일 서빙
    location ^~ /hufs-timetable/ {
        rewrite ^/hufs-timetable(/.*)$ $1 last;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # gzip 압축
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        image/svg+xml;

    # 정적 파일 캐싱
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
