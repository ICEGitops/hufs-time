name: CI - Fullstack Build

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  GITOPS_REPO: ICEGitops/gitops
  FRONT_IMAGE: ghcr.io/icegitops/hufs-timetable
  BACK_IMAGE: ghcr.io/icegitops/hufs-timetable-back

jobs:
  # ── 프론트엔드 빌드 ──────────────────────────
  build-front:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.FRONT_IMAGE }}:${{ github.sha }},${{ env.FRONT_IMAGE }}:latest

  # ── 백엔드 빌드 ──────────────────────────────
  build-back:
    name: Build Backend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.BACK_IMAGE }}:${{ github.sha }},${{ env.BACK_IMAGE }}:latest

  # ── GitOps 매니페스트 업데이트 ────────────────
  update-gitops:
    name: Update GitOps Manifests
    needs: [build-front, build-back]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops
      - uses: imranismail/setup-kustomize@v2

      - name: Update frontend image tag
        run: |
          cd gitops/projects/hufs-timetable
          kustomize edit set image ${{ env.FRONT_IMAGE }}=${{ env.FRONT_IMAGE }}:${{ github.sha }}

      - name: Update backend image tag
        run: |
          cd gitops/projects/hufs-timetable-back
          kustomize edit set image ${{ env.BACK_IMAGE }}=${{ env.BACK_IMAGE }}:${{ github.sha }}

      - name: Commit and push
        run: |
          cd gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "deploy(fullstack): update images to ${{ github.sha }}"
          git push
